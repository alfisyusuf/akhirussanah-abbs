<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Guru - Akhirussanah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <nav class="bg-red-800 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="font-bold text-lg">Admin Akhirussanah</h1>
        <div class="flex gap-4">
            <a href="scan.html" class="bg-red-700 px-3 py-1 rounded hover:bg-red-600 text-sm flex items-center">📷 Buka Scanner</a>
            <button onclick="logout()" class="bg-gray-100 text-red-800 px-3 py-1 rounded hover:bg-gray-200 text-sm font-bold">Keluar</button>
        </div>
    </nav>

    <div class="p-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            
            <div class="bg-white p-4 rounded shadow md:col-span-1 h-fit">
                <h2 class="font-bold mb-3 border-b pb-2">Broadcast WhatsApp</h2>
                <p class="text-xs text-gray-500 mb-2">Gunakan tombol variabel di bawah ini untuk menyisipkan data dinamis.</p>
                <div class="flex gap-2 mb-2">
                    <button onclick="insertVar('{nama}')" class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-mono">+ {nama}</button>
                    <button onclick="insertVar('{link}')" class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs font-mono">+ {link}</button>
                </div>
                <textarea id="waMessage" class="w-full border rounded p-2 text-sm h-40 focus:outline-none focus:ring-1 focus:ring-red-800">Assalamu'alaikum Bapak/Ibu wali dari {nama}. 

Mengharap kehadiran Bapak/Ibu dalam acara Akhirussanah Kelas XII. Berikut adalah tautan undangan dan tiket masuk digital Anda:
{link}

Mohon segera konfirmasi kehadiran melalui tautan tersebut. Terima kasih.</textarea>
                <button onclick="simpanPesan()" class="mt-2 w-full bg-green-600 text-white py-2 rounded text-sm hover:bg-green-700 transition">Simpan Template Pesan</button>
            </div>

            <div class="bg-white p-4 rounded shadow md:col-span-2 overflow-x-auto">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="font-bold text-lg">Data Kehadiran</h2>
                    <select id="filterKelas" class="border rounded p-1 text-sm focus:outline-none bg-gray-50" onchange="loadData()">
                        <option value="ALL">Semua Kelas</option>
                    </select>
                </div>
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-gray-100 border-b border-t text-gray-700">
                            <th class="p-3">Nama Siswa</th>
                            <th class="p-3">Kelas</th>
                            <th class="p-3">Status Konfirmasi</th>
                            <th class="p-3 text-center">Kehadiran (Hari H)</th>
                            <th class="p-3 text-center">Kirim WA</th>
                        </tr>
                    </thead>
                    <tbody id="studentTable"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
    const supabaseClient = supabase.createClient('https://cckmxdlirnfdhzsgvgne.supabase.co', 'sb_publishable_knnp-v7sGFE7PtOZuedsWg_EOsDS0-z');

    async function checkAuth() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        
        // 1. Jika belum login sama sekali, tendang ke login
        if (!session) {
            window.location.replace('login.html');
            return;
        }

        // 2. PROTEKSI EKSTRA: Jika yang mencoba masuk adalah akun panitia, larang akses!
        if (session.user.email.includes('panitia')) {
            alert("Akses Ditolak! Halaman Dasbor ini khusus untuk Guru/Admin.");
            window.location.replace('scan.html');
        }
    }
    checkAuth();

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.replace('login.html');
    }

    const txtMessage = document.getElementById('waMessage');

    // 1. Ambil template dari Supabase secara otomatis saat web dibuka
    async function muatTemplate() {
        const { data, error } = await supabaseClient.from('pengaturan').select('nilai').eq('kunci', 'template_wa').single();
        if (data) {
            txtMessage.value = data.nilai;
        }
    }
    muatTemplate();

    function insertVar(val) { txtMessage.value += val; }

    // 2. Simpan template langsung ke Supabase saat tombol ditekan
    async function simpanPesan() {
        const btn = event.target;
        const teksAsli = btn.innerText;
        btn.innerText = "Menyimpan ke server..."; 
        btn.disabled = true;

        const { error } = await supabaseClient.from('pengaturan').update({ nilai: txtMessage.value }).eq('kunci', 'template_wa');
        
        if (!error) {
            alert('✅ Template WA berhasil disimpan secara global di database!');
        } else {
            alert('⚠️ Gagal menyimpan template ke server.');
        }
        
        btn.innerText = teksAsli;
        btn.disabled = false;
    }

    async function loadData() {
        const { data, error } = await supabaseClient.from('undangan').select('*').order('kelas').order('nama');
        if(error) return alert("Gagal mengambil data dari Supabase.");

        const kelasSet = [...new Set(data.map(i => i.kelas))].sort();
        const filter = document.getElementById('filterKelas');
        if(filter.options.length === 1) {
            kelasSet.forEach(k => filter.innerHTML += `<option value="${k}">${k}</option>`);
        }

        const selectedKelas = filter.value;
        const tbody = document.getElementById('studentTable');
        tbody.innerHTML = '';

        data.filter(i => selectedKelas === 'ALL' || i.kelas === selectedKelas).forEach(student => {
            const domain = window.location.origin;
            const linkUndangan = `${domain}/?token=${student.qr_token}`;
            let msg = txtMessage.value.replace(/{nama}/g, student.nama).replace(/{link}/g, linkUndangan);
            const encodedMsg = encodeURIComponent(msg);

            const hadirBadge = student.hadir_hari_h 
                ? '<span class="bg-green-100 text-green-800 border border-green-300 px-2 py-1 rounded text-xs font-semibold">✅ Check-in</span>' 
                : '<span class="bg-gray-100 text-gray-500 px-2 py-1 rounded text-xs">-</span>';

            tbody.innerHTML += `
                <tr class="border-b hover:bg-red-50 transition">
                    <td class="p-3 font-medium">${student.nama}</td>
                    <td class="p-3">${student.kelas}</td>
                    <td class="p-3 text-xs leading-relaxed">
                        Anak: <span class="font-semibold text-gray-800">${student.konf_siswa}</span><br>
                        Wali: <span class="font-semibold text-gray-800">${student.konf_ortu}</span>
                    </td>
                    <td class="p-3 text-center">${hadirBadge}</td>
                    <td class="p-3">
                        <div class="flex flex-col gap-1.5 items-center">
                            ${student.Ayah ? `<a href="https://wa.me/${student.Ayah}?text=${encodedMsg}" target="_blank" class="bg-blue-600 text-white w-full text-center rounded py-1 text-xs hover:bg-blue-700">Bapak</a>` : ''}
                            ${student.Ibu ? `<a href="https://wa.me/${student.Ibu}?text=${encodedMsg}" target="_blank" class="bg-pink-600 text-white w-full text-center rounded py-1 text-xs hover:bg-pink-700">Ibu</a>` : ''}
                        </div>
                    </td>
                </tr>`;
        });
    }
    loadData();
</script>
</body>
</html>
