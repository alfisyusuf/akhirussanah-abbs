<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lembar Mutasi XII 6</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
        }
        .controls {
            text-align: center;
            padding: 20px;
            background: #fff;
            margin-bottom: 20px;
            border-bottom: 1px solid #d1d5db;
        }
        .btn-print {
            background-color: #2563eb;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-print:hover {
            background-color: #1d4ed8;
        }
        .page {
            width: 210mm;
            min-height: 297mm;
            padding: 15mm 20mm;
            margin: 10mm auto;
            background: white;
            box-sizing: border-box;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .title {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .student-info {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 6px 8px;
            vertical-align: top;
        }
        th {
            background-color: #f2f2f2;
            font-size: 13px;
            font-weight: normal;
            text-align: center;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .header-keluar {
            font-weight: bold;
            font-size: 14px;
        }
        .signature-block {
            font-size: 13px;
            padding-left: 5px;
            line-height: 1.4;
        }
        .signature-space {
            height: 55px;
        }
        .empty-row td {
            height: 180px;
        }
        .date-col, .class-col, .reason-col {
            text-align: center;
            font-size: 14px;
        }

        @media print {
            body {
                background: none;
                margin: 0;
            }
            .controls {
                display: none;
            }
            .page {
                margin: 0;
                box-shadow: none;
                page-break-after: always;
            }
            @page {
                size: A4 portrait;
                margin: 0;
            }
        }
    </style>
</head>
