<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Panitia - Akhirussanah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #reader button { background-color: #800000; color: white; padding: 8px 16px; border-radius: 6px; font-size: 14px; margin: 4px; cursor: pointer; border: none; }
        #reader button:hover { background-color: #5c0000; }
        #reader select { padding: 6px; border-radius: 4px; border: 1px solid #ccc; margin-bottom: 10px; }
        
        /* Tombol Toggle Posisi */
        .btn-posisi { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-radius: 12px; border: 2px solid #e5e7eb; background: #fff; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; width: 100%; text-align: left;}
        .btn-posisi.dalam { border-color: #166534; background: #f0fdf4; }
        .btn-posisi.luar { border-color: #991b1b; background: #fef2f2; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen font-sans relative">

    <!-- Navbar -->
    <nav class="bg-red-800 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-40">
        <h1 class="font-bold text-lg">📷 Portal Check-in</h1>
        <button onclick="logout()" class="text-red-200 text-sm hover:text-white transition font-semibold">Keluar</button>
    </nav>

    <!-- Modal Kontrol Kehadiran & Posisi (Ayah/Ibu) -->
    <div id="modalKontrol" class="fixed inset-0 bg-black bg-opacity-75 z-50 hidden flex flex-col items-center justify-center p-4 backdrop-blur-sm transition-all">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-1 text-gray-800 text-center">Kelola Akses Masuk</h3>
            <p id="modalNama" class="text-lg text-red-800 font-bold mb-1 text-center"></p>
            <p id="modalKelas" class="text-xs text-gray-500 mb-4 text-center"></p>

            <div class="bg-blue-50 text-blue-800 p-3 rounded-lg mb-4 text-sm border border-blue-100 text-center">
                Konfirmasi Web: <span id="modalKonf" class="font-bold"></span>
            </div>

            <!-- Panel Ayah -->
            <div id="panelAyah" class="mb-3">
                <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Akses Ayah</p>
                <button id="btnAyah" class="btn-posisi luar" onclick="togglePosisi('ayah')">
                    <div>
                        <span class="text-xl mr-2">👨</span>
                        <span class="font-bold text-gray-800">Ayah / Perwakilan</span>
                    </div>
                    <span id="statusAyah" class="text-xs font-bold px-3 py-1 rounded-full bg-red-100 text-red-700">Di Luar</span>
                </button>
            </div>

            <!-- Panel Ibu -->
            <div id="panelIbu" class="mb-5">
                <p class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Akses Ibu</p>
                <button id="btnIbu" class="btn-posisi luar" onclick="togglePosisi('ibu')">
                    <div>
                        <span class="text-xl mr-2">👩</span>
                        <span class="font-bold text-gray-800">Ibu / Perwakilan</span>
                    </div>
                    <span id="statusIbu" class="text-xs font-bold px-3 py-1 rounded-full bg-red-100 text-red-700">Di Luar</span>
                </button>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="batalScan()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition">Tutup</button>
                <button onclick="simpanKehadiran()" class="flex-1 bg-red-800 hover:bg-red-900 text-white font-bold py-3 rounded-xl shadow-md transition">Selesai & Simpan</button>
            </div>
        </div>
    </div>

    <!-- Layout Utama -->
    <div class="p-4 max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Kolom Kiri: Scanner -->
        <div class="md:col-span-1 flex flex-col gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                <h2 class="font-bold text-gray-700 border-b pb-2 mb-4 text-center">Pemindai QR</h2>
                <div id="reader" class="w-full rounded-lg overflow-hidden border-2 border-gray-100"></div>
                
                <div id="resultCard" class="hidden mt-4 bg-green-100 border border-green-400 w-full p-4 rounded-lg text-center shadow-sm">
                    <div class="text-4xl mb-1">✅</div>
                    <h2 class="text-lg font-bold text-green-800">Data Diperbarui!</h2>
                </div>
                
                <div id="errorCard" class="hidden mt-4 bg-red-100 border border-red-400 w-full p-4 rounded-lg text-center shadow-sm">
                    <div class="text-4xl mb-1">❌</div>
                    <h2 class="text-lg font-bold text-red-800">QR Tidak Valid!</h2>
                </div>
            </div>
        </div>

        <!-- Kolom Kanan: Data & Rekap -->
        <div class="md:col-span-2 flex flex-col gap-4">
            <!-- Rekapitulasi -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">Total Hadir (Pernah Datang)</p>
                    <p class="mt-1"><span id="totalHadir" class="text-3xl font-bold text-gray-800">0</span> <span class="text-sm text-gray-500">Orang</span></p>
                </div>
                <div class="bg-green-50 p-4 rounded-xl shadow-sm border border-green-200">
                    <p class="text-xs text-green-700 font-bold uppercase tracking-wider">Berada di Dalam Ballroom</p>
                    <p class="mt-1"><span id="totalDalam" class="text-3xl font-bold text-green-800">0</span> <span class="text-sm text-green-600">Orang</span></p>
                </div>
            </div>

            <!-- Tabel Riwayat -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex-1">
                <div class="p-3 bg-gray-50 border-b flex justify-between items-center">
                    <h3 class="font-bold text-gray-700 text-sm">Status Akses Terkini</h3>
                    <div class="flex gap-2">
                        <select id="filterKelas" class="border border-gray-300 rounded px-2 py-1 text-xs focus:outline-none bg-white" onchange="renderTable()">
                            <option value="ALL">Semua Kelas</option>
                        </select>
                        <button onclick="loadHadirData()" class="text-xs bg-gray-200 hover:bg-gray-300 text-gray-700 px-2 py-1 rounded">🔄</button>
                    </div>
                </div>
                <div class="overflow-x-auto max-h-[450px]">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-white sticky top-0 shadow-sm">
                            <tr class="text-gray-500 border-b text-xs uppercase">
                                <th class="p-3 font-medium">Keluarga</th>
                                <th class="p-3 font-medium text-center">Ayah</th>
                                <th class="p-3 font-medium text-center">Ibu</th>
                            </tr>
                        </thead>
                        <tbody id="hadirTable">
                            <tr><td colspan="3" class="p-4 text-center text-gray-400">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
    const supabaseClient = supabase.createClient('https://cckmxdlirnfdhzsgvgne.supabase.co', 'sb_publishable_knnp-v7sGFE7PtOZuedsWg_EOsDS0-z');
    let allData = [];
    let isScanning = false;
    let idSiswaScan = null;
    
    // Status sementara saat modal terbuka
    let stAyah = { hadir: false, posisi: 'Luar' };
    let stIbu = { hadir: false, posisi: 'Luar' };

    async function checkAuth() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) window.location.replace('login.html');
    }
    checkAuth();

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.replace('login.html');
    }

    // ── MENGAMBIL & MENAMPILKAN DATA ──
    async function loadHadirData() {
        // Ambil SEMUA data yang Ayah ATAU Ibunya sudah pernah hadir
        const { data, error } = await supabaseClient
            .from('undangan')
            .select('id, nama, kelas, hadir_ayah, hadir_ibu, posisi_ayah, posisi_ibu')
            .or('hadir_ayah.eq.true,hadir_ibu.eq.true')
            .order('kelas').order('nama');

        if (!error && data) {
            allData = data;
            populateFilter(data);
            renderTable();
        }
    }

    function populateFilter(data) {
        const filter = document.getElementById('filterKelas');
        const currentVal = filter.value;
        const kelasSet = [...new Set(data.map(i => i.kelas))].sort();
        filter.innerHTML = `<option value="ALL">Semua Kelas</option>`;
        kelasSet.forEach(k => filter.innerHTML += `<option value="${k}">${k}</option>`);
        filter.value = currentVal; 
    }

    function renderTable() {
        const tbody = document.getElementById('hadirTable');
        const filterVal = document.getElementById('filterKelas').value;
        tbody.innerHTML = '';

        let filtered = filterVal === 'ALL' ? allData : allData.filter(s => s.kelas === filterVal);
        let totalPernahHadir = 0;
        let totalDiDalam = 0;

        if (filtered.length === 0) {
            document.getElementById('totalHadir').innerText = '0';
            document.getElementById('totalDalam').innerText = '0';
            tbody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-gray-400">Belum ada tamu yang masuk.</td></tr>`;
            return;
        }

        filtered.forEach(siswa => {
            // Hitung Rekap
            if (siswa.hadir_ayah) totalPernahHadir++;
            if (siswa.hadir_ibu) totalPernahHadir++;
            if (siswa.posisi_ayah === 'Dalam') totalDiDalam++;
            if (siswa.posisi_ibu === 'Dalam') totalDiDalam++;

            // Render Label Status
            const lblAyah = !siswa.hadir_ayah ? `<span class="text-xs text-gray-300">-</span>` 
                          : (siswa.posisi_ayah === 'Dalam' ? `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">Dalam</span>` : `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold">Luar</span>`);
            const lblIbu = !siswa.hadir_ibu ? `<span class="text-xs text-gray-300">-</span>` 
                          : (siswa.posisi_ibu === 'Dalam' ? `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold">Dalam</span>` : `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold">Luar</span>`);

            tbody.innerHTML += `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3">
                        <p class="font-medium text-gray-800 leading-tight">${siswa.nama}</p>
                        <p class="text-xs text-gray-500">${siswa.kelas}</p>
                    </td>
                    <td class="p-3 text-center">${lblAyah}</td>
                    <td class="p-3 text-center">${lblIbu}</td>
                </tr>
            `;
        });

        document.getElementById('totalHadir').innerText = totalPernahHadir;
        document.getElementById('totalDalam').innerText = totalDiDalam;
    }

    // ── LOGIKA PEMINDAIAN (SCANNER) ──
    async function onScanSuccess(decodedText) {
        if(isScanning) return; 
        isScanning = true;

        document.getElementById('resultCard').classList.add('hidden'); 
        document.getElementById('errorCard').classList.add('hidden');

        const { data, error } = await supabaseClient.from('undangan')
            .select('id, nama, kelas, konf_ortu, hadir_ayah, hadir_ibu, posisi_ayah, posisi_ibu')
            .eq('qr_token', decodedText).single();
        
        if(data) {
            idSiswaScan = data.id;
            
            // Set Info Profil
            document.getElementById('modalNama').innerText = data.nama;
            document.getElementById('modalKelas').innerText = "Kelas " + data.kelas;
            document.getElementById('modalKonf').innerText = data.konf_ortu || "Belum Mengisi Form";
            
            // Set Status Sementara (Tarik dari DB)
            stAyah.hadir = data.hadir_ayah || false;
            stAyah.posisi = data.posisi_ayah || 'Luar';
            stIbu.hadir = data.hadir_ibu || false;
            stIbu.posisi = data.posisi_ibu || 'Luar';

            updateTampilanTombol();
            document.getElementById('modalKontrol').classList.remove('hidden');
        } else {
            document.getElementById('errorCard').classList.remove('hidden');
            setTimeout(() => { document.getElementById('errorCard').classList.add('hidden'); isScanning = false; }, 2500);
        }
    }

    // ── LOGIKA TOMBOL TOGGLE (MASUK/KELUAR) ──
    function togglePosisi(ortu) {
        if (ortu === 'ayah') {
            stAyah.hadir = true; // Jika dipencet, otomatis dianggap pernah hadir
            stAyah.posisi = (stAyah.posisi === 'Luar') ? 'Dalam' : 'Luar';
        } else {
            stIbu.hadir = true;
            stIbu.posisi = (stIbu.posisi === 'Luar') ? 'Dalam' : 'Luar';
        }
        updateTampilanTombol();
    }

    function updateTampilanTombol() {
        const btnA = document.getElementById('btnAyah');
        const stA = document.getElementById('statusAyah');
        if (stAyah.posisi === 'Dalam') {
            btnA.className = 'btn-posisi dalam'; stA.className = 'text-xs font-bold px-3 py-1 rounded-full bg-green-200 text-green-800'; stA.innerText = 'DI DALAM';
        } else {
            btnA.className = 'btn-posisi luar'; stA.className = 'text-xs font-bold px-3 py-1 rounded-full bg-red-100 text-red-700'; stA.innerText = 'DI LUAR';
        }

        const btnI = document.getElementById('btnIbu');
        const stI = document.getElementById('statusIbu');
        if (stIbu.posisi === 'Dalam') {
            btnI.className = 'btn-posisi dalam'; stI.className = 'text-xs font-bold px-3 py-1 rounded-full bg-green-200 text-green-800'; stI.innerText = 'DI DALAM';
        } else {
            btnI.className = 'btn-posisi luar'; stI.className = 'text-xs font-bold px-3 py-1 rounded-full bg-red-100 text-red-700'; stI.innerText = 'DI LUAR';
        }
    }

    // ── SIMPAN DATA KE SUPABASE ──
    async function simpanKehadiran() {
        document.getElementById('modalKontrol').classList.add('hidden'); 

        await supabaseClient.from('undangan').update({ 
            hadir_ayah: stAyah.hadir,
            posisi_ayah: stAyah.posisi,
            hadir_ibu: stIbu.hadir,
            posisi_ibu: stIbu.posisi
        }).eq('id', idSiswaScan);
        
        document.getElementById('resultCard').classList.remove('hidden');
        loadHadirData(); 

        setTimeout(() => { 
            document.getElementById('resultCard').classList.add('hidden'); 
            isScanning = false; 
            idSiswaScan = null;
        }, 2000);
    }

    function batalScan() {
        document.getElementById('modalKontrol').classList.add('hidden');
        isScanning = false;
        idSiswaScan = null;
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadHadirData(); 
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        html5QrcodeScanner.render(onScanSuccess, () => {});
    });
</script>
</body>
</html>
